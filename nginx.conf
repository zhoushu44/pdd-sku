# nginx 配置 - 监听 0.0.0.0:5173
# daemon off; 写入配置文件，避免命令行 -g 参数被 shell 拆分导致 "invalid option: off;" 错误
daemon off;

server {
    listen       5173;
    # 显式绑定 0.0.0.0，确保容器外可访问
    listen       [::]:5173;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip 压缩，提升传输效率
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 静态资源长缓存（Vite 构建产物带 hash，可安全长缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA 路由 fallback：所有未匹配的路由都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 不缓存，确保用户总能拿到最新版本
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}
